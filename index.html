<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>قائمة العزومة — Guest List</title>
<meta property="og:title" content="قائمة عزومة فرح يوستينا ومحب 🤍">
<meta property="og:description" content="سجّلوا كل عيلة وابعتوها بضغطة واحدة على واتساب — Add each family, one tap sends the list on WhatsApp">
<meta property="og:type" content="website">
<meta name="robots" content="noindex, nofollow">
<style>
  :root{--bg:#0e1a2b;--card:#152438;--gold:#c9a227;--gold-b:#e8c95c;--ivory:#f5efe2;--dim:#b9b29e;--line:#26364e;--green:#1f8a4c}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ivory);font:17px/1.6 'Segoe UI',-apple-system,sans-serif;padding:22px 14px 120px}
  .wrap{max-width:520px;margin:0 auto}
  h1{font-size:22px;color:var(--gold-b);text-align:center}
  .sub{color:var(--dim);font-size:14px;text-align:center;margin:6px 0 18px;line-height:1.7}
  .quick{display:flex;gap:10px;margin-bottom:8px}
  .quick button{flex:1;padding:15px 8px;border:1.5px solid var(--gold);border-radius:14px;background:var(--card);color:var(--gold-b);font-size:15.5px;font-weight:700;line-height:1.4}
  .quick button small{display:block;font-weight:400;color:var(--dim);font-size:11.5px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:13px;margin:16px 0 2px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  label{display:block;margin:14px 0 6px;font-weight:700;font-size:16px}
  label small{display:block;font-weight:400;color:var(--dim);font-size:12.5px}
  input{width:100%;padding:16px;border-radius:12px;border:1.5px solid var(--line);background:#0b1524;color:var(--ivory);font-size:18px}
  input:focus{border-color:var(--gold);outline:none}
  .count-row{display:flex;align-items:center;gap:14px;justify-content:center;margin-top:4px}
  .count-row button{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--gold);background:var(--card);color:var(--gold-b);font-size:30px;font-weight:700}
  #count{font-size:34px;font-weight:800;color:var(--gold-b);min-width:56px;text-align:center}
  .add{width:100%;margin-top:20px;padding:18px;border:0;border-radius:14px;background:linear-gradient(120deg,var(--gold),var(--gold-b));color:#0b1524;font-size:19px;font-weight:800}
  .list{margin-top:26px}
  .fam{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
  .fam .info{flex:1;min-width:0}
  .fam b{font-size:16px;display:block;overflow-wrap:anywhere}
  .fam .meta{color:var(--dim);font-size:13px}
  .fam .cnt{display:flex;align-items:center;gap:6px}
  .fam .cnt button{width:34px;height:34px;border-radius:50%;border:1px solid var(--gold);background:none;color:var(--gold-b);font-size:18px;font-weight:700}
  .fam .cnt span{font-size:17px;font-weight:800;color:var(--gold-b);min-width:20px;text-align:center}
  .fam .del{background:none;border:0;color:#c96a6a;font-size:21px;padding:4px 6px}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1f5c36;color:#fff;padding:11px 20px;border-radius:10px;font-size:14.5px;display:none;z-index:9;max-width:92vw;text-align:center}
  .send{position:fixed;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(9,18,32,.96) 30%)}
  .send button{width:100%;max-width:520px;margin:0 auto;display:block;padding:18px;border:0;border-radius:14px;background:var(--green);color:#fff;font-size:19px;font-weight:800}
  .send button:disabled{opacity:.4}
  .hint{text-align:center;color:var(--dim);font-size:12.5px;margin-top:8px}
  .en{direction:ltr;font-size:.86em;color:var(--dim)}
</style>
</head>
<body>
<div class="wrap">
  <h1>فرح يوستينا ومحب 🤍</h1>
  <p class="sub">سجّلوا كل عيلة وابعتوها بضغطة واحدة على واتساب.<br><span class="en">Add each family, then one tap sends the whole list on WhatsApp.</span></p>

  <div class="quick">
    <button type="button" id="pickBtn" hidden onclick="pickContacts()">📇 اختار من جهات الاتصال<small>يفتح تليفونك وتعلّم على العائلات · Pick straight from your phone contacts</small></button>
    <button type="button" onclick="document.getElementById('file').click()">📎 ارفع ملف أو صورة<small>صور الورقة أو سكرين شوت أو ملف جهات اتصال · Photos, screenshots, or contact files</small></button>
  </div>
  <input type="file" id="file" hidden multiple accept="image/*,.vcf,.txt,.csv,text/vcard,text/x-vcard" onchange="handleFiles(this.files)">

  <div class="divider">أو سجّلوا بنفسكم · or type manually</div>

  <label>اسم العيلة أو كبير العيلة <small>زي ما بتعرفوه — مش لازم يكون مظبوط بالحرف · The family / head of household, however you know them</small></label>
  <input id="name" placeholder="مثال: عيلة عمو مجدي — Tante Mona's family" autocomplete="off">

  <label>عدد الأفراد <small>تقريبًا — كام واحد جاي؟ · How many people?</small></label>
  <div class="count-row">
    <button type="button" onclick="bump(-1)">−</button>
    <span id="count">2</span>
    <button type="button" onclick="bump(1)">+</button>
  </div>

  <label>رقم واتساب <small>رقم واحد بس للعيلة كلها — ولو مش معاكم سيبوه فاضي · ONE number per family — leave empty if you don't have it</small></label>
  <input id="phone" inputmode="tel" placeholder="+20 1X XXX XXXX" autocomplete="off">

  <button class="add" type="button" onclick="add()">➕ ضيف العيلة · Add family</button>

  <div class="list" id="list"></div>
</div>

<div class="toast" id="toast"></div>
<div class="send">
  <button id="sendBtn" type="button" onclick="send()" disabled>📤 ابعت القائمة على واتساب · Send list on WhatsApp</button>
  <p class="hint">هتفتح واتساب وتختاروا تبعتوها لمين — جوزيف أو مين ما تحبوا · Opens WhatsApp — you choose who to send it to</p>
</div>

<script>
let fams = [];
try { fams = JSON.parse(localStorage.getItem("wedFams") || "[]"); } catch(e) {}
let n = 2;

function bump(d){ n = Math.min(15, Math.max(1, n + d)); document.getElementById("count").textContent = n; }
function esc(s){ const d = document.createElement("span"); d.textContent = s; return d.innerHTML; }
function toast(msg){ const t = document.getElementById("toast"); t.textContent = msg; t.style.display = "block"; clearTimeout(t._h); t._h = setTimeout(()=> t.style.display = "none", 2600); }

function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";
  fams.forEach((f, i) => {
    const row = document.createElement("div");
    row.className = "fam";
    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `<b>${esc(f.name)}</b><div class="meta">${f.phone ? esc(f.phone) : "بدون رقم"}</div>`;
    const cnt = document.createElement("div");
    cnt.className = "cnt";
    const minus = document.createElement("button"); minus.textContent = "−";
    minus.onclick = () => { f.count = Math.max(1, f.count - 1); save(); };
    const num = document.createElement("span"); num.textContent = f.count;
    const plus = document.createElement("button"); plus.textContent = "+";
    plus.onclick = () => { f.count = Math.min(15, f.count + 1); save(); };
    cnt.append(minus, num, plus);
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕";
    del.onclick = () => { fams.splice(i, 1); save(); };
    row.append(info, cnt, del);
    el.appendChild(row);
  });
  const total = fams.reduce((s, f) => s + f.count, 0);
  document.getElementById("sendBtn").disabled = fams.length === 0;
  document.getElementById("sendBtn").textContent = fams.length
    ? `📤 ابعت القائمة (${fams.length} عيلة · ${total} فرد) · Send on WhatsApp`
    : "📤 ابعت القائمة على واتساب · Send list on WhatsApp";
}
function save(){ localStorage.setItem("wedFams", JSON.stringify(fams)); render(); }

function add(){
  const name = document.getElementById("name").value.trim();
  if (!name) { document.getElementById("name").focus(); return; }
  fams.push({ name, count: n, phone: document.getElementById("phone").value.trim() });
  document.getElementById("name").value = ""; document.getElementById("phone").value = "";
  n = 2; document.getElementById("count").textContent = n;
  save();
  document.getElementById("name").focus();
}

/* ── Pick from phone contacts (Android Chrome; button hidden elsewhere) ── */
if ("contacts" in navigator && "select" in navigator.contacts) {
  document.getElementById("pickBtn").hidden = false;
}
async function pickContacts(){
  try {
    const picked = await navigator.contacts.select(["name", "tel"], { multiple: true });
    let added = 0;
    for (const c of picked) {
      const name = (c.name && c.name[0]) ? c.name[0] : "";
      if (!name) continue;
      fams.push({ name, count: 2, phone: (c.tel && c.tel[0]) ? c.tel[0] : "" });
      added++;
    }
    if (added) { save(); toast(`اتضاف ${added} عيلة ✅ — ظبطوا عدد الأفراد بعلامة + و −`); }
  } catch(e) { /* user cancelled */ }
}

/* ── Upload: .vcf/.csv/.txt parse into rows; photos forward via share sheet ── */
function decodeQP(s){
  try { return decodeURIComponent(s.replace(/=\r?\n/g, "").replace(/=([0-9A-Fa-f]{2})/g, "%$1")); }
  catch(e) { return s; }
}
function parseVcf(text){
  const out = [];
  for (const card of text.split(/BEGIN:VCARD/i).slice(1)) {
    let name = "", tel = "";
    for (const raw of card.split(/\r?\n/)) {
      const line = raw.trim();
      const m = line.match(/^(FN|N)([^:]*):(.*)$/i);
      if (m && !name) {
        let v = m[3];
        if (/QUOTED-PRINTABLE/i.test(m[2])) v = decodeQP(v);
        name = (m[1].toUpperCase() === "N") ? v.split(";").filter(Boolean).reverse().join(" ").trim() : v.trim();
      }
      const t = line.match(/^TEL[^:]*:(.+)$/i);
      if (t && !tel) tel = t[1].trim();
    }
    if (name) out.push({ name, count: 2, phone: tel });
  }
  return out;
}
function parseLines(text){
  const out = [];
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    const t = line.match(/(\+?[\d][\d\s\-()]{7,})/);
    const phone = t ? t[1].replace(/[\s\-()]/g, "") : "";
    const name = line.replace(t ? t[1] : "", "").replace(/[,;|]+/g, " ").trim();
    if (name) out.push({ name, count: 2, phone });
  }
  return out;
}
async function handleFiles(files){
  const photos = [];
  let added = 0;
  for (const f of files) {
    if (f.type.startsWith("image/")) { photos.push(f); continue; }
    const text = await f.text();
    const rows = /BEGIN:VCARD/i.test(text) ? parseVcf(text) : parseLines(text);
    rows.forEach(r => { fams.push(r); added++; });
  }
  if (added) { save(); toast(`اتضاف ${added} عيلة من الملف ✅ — راجعوا العدد بعلامة + و −`); }
  if (photos.length) {
    const payload = { files: photos, text: "صور قائمة عزومة فرح يوستينا ومحب 🤍" };
    if (navigator.canShare && navigator.canShare({ files: photos })) {
      try { await navigator.share(payload); toast("اختاروا واتساب وابعتوا الصور لجوزيف 🤍"); }
      catch(e) { /* cancelled */ }
    } else {
      toast("الصور دي ابعتوها لجوزيف على واتساب مباشرة 🤍");
    }
  }
  document.getElementById("file").value = "";
}

function send(){
  const total = fams.reduce((s, f) => s + f.count, 0);
  const lines = fams.map((f, i) => `${i+1}. ${f.name} — ${f.count} أفراد${f.phone ? " — " + f.phone : ""}`);
  const msg = `قائمة عزومة فرح يوستينا ومحب 🤍\n${fams.length} عيلة · ${total} فرد\n\n${lines.join("\n")}`;
  location.href = "https://wa.me/?text=" + encodeURIComponent(msg);
}
render();
</script>
</body>
</html>
